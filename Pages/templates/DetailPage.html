<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ recipe.recipe_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<!-- Ana Sayfa linki -->
<a href="http://localhost:8000/home/" class="btn btn-warning">Ana Sayfaya Dön</a>

<!-- Recipe detaylarını gösteren card classı, css kısımları bootstrapden gelir -->
<div class="card" style="width: 20rem;">
    <img src="{{ recipe.image_url }}" class="card-img-top" alt="...">
    <div class="card-body">
        <h5 class="card-title">{{ recipe.recipe_name }}</h5>
        <p class="card-text">{{ recipe.description }}</p>
        <p class="card-text">{{ recipe.ingredients }}</p>
        <p class="card-text">{{ recipe.rating_num }} oy verildi <br> Ortalama puani: {{ recipe.rating }}</p>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
