<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ana Sayfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<!-- Eger user login yapmıssa logout butonu gosterilinir, logout yapmıs ise login butonu gosterilinir -->
{% if 'userid' in request.session %}
    <a href="{% url 'logout' %}" class="btn btn-danger">Çıkış Yap</a>
{% else %}
    <a href="{% url 'login' %}" class="btn btn-primary">Giriş Yap</a>
{% endif %}
<!-- Eger user login ise user'in userid si alınarak profile sayfasına gonderilir svg ise profil iconudur -->
{% if 'userid' in request.session %}
    <a href="{% url 'profile' userid=user.userid %}">
        <svg style="width: 35px;height: 35px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path d="M399 384.2C376.9 345.8 335.4 320 288 320H224c-47.4 0-88.9 25.8-111 64.2c35.2 39.2 86.2 63.8 143 63.8s107.8-24.7 143-63.8zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256zm256 16a72 72 0 1 0 0-144 72 72 0 1 0 0 144z"></path>
        </svg>
    </a>
{% else %}
<!-- Eger logout durumunda ise profile svg'si yani profile icon'una tıklanırsa seni login sayfasına atar -->
    <a href="{% url 'login' %}">
        <svg style="width: 35px;height: 35px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path d="M399 384.2C376.9 345.8 335.4 320 288 320H224c-47.4 0-88.9 25.8-111 64.2c35.2 39.2 86.2 63.8 143 63.8s107.8-24.7 143-63.8zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256zm256 16a72 72 0 1 0 0-144 72 72 0 1 0 0 144z"></path>
        </svg>
    </a>
{% endif %}
<!-- Recipe tablosundaki recipe detaylarını for loopunda bilgiler gösterilinir -->
<div class="row row-cols-1 row-cols-md-5 g-4">
    {% for recipe in recipes %}
        <div class="col">
            <div class="card">
                <img src="{{ recipe.image_url }}" class="card-img-top" alt="..." width="192px" height="262px">
                <div class="card-body">
                    <h5 class="card-title">{{ recipe.recipe_name }}</h5>
                    <p class="card-text">{{ recipe.description }}</p>
                    <a href="{% url 'details' recipe.recipe_id %}" class="btn btn-primary">Tarif Detayını Gör</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
